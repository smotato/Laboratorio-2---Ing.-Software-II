<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Lista de Barberos</title>
    </h:head>
    <h:body>
        <h2>Lista de Barberos</h2>
        <h:form>
            Buscar por nombre:
            <h:inputText value="#{barberoManagedBean.nombre}">
                <f:ajax event="keyup" 
                        listener="#{barberoManagedBean.nombreChangeListener}" 
                        render="barberoTable"/>
            </h:inputText>

            <br/><br/>

            <h:dataTable id="barberoTable" 
                         value="#{barberoManagedBean.listByName}" 
                         var="b"
                         border="1">

                <h:column>
                    <f:facet name="header">ID</f:facet>
                    #{b.idBarbero}
                </h:column>

                <h:column>
                    <f:facet name="header">Nombres</f:facet>
                    #{b.nombres}
                </h:column>

                <h:column>
                    <f:facet name="header">Apellidos</f:facet>
                    #{b.apellidos}
                </h:column>

                <h:column>
                    <f:facet name="header">Teléfono</f:facet>
                    #{b.telefono}
                </h:column>

                <h:column>
                    <f:facet name="header">Correo</f:facet>
                    #{b.correo}
                </h:column>

                <h:column>
                    <f:facet name="header">Balance</f:facet>
                    #{b.balance}
                </h:column>

            </h:dataTable>
        </h:form>
    </h:body>
</html>
