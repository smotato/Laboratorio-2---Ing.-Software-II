<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Barbería - Consulta de Balance</title>
    </h:head>
    <h:body>
        <h:form>
            <fieldset>
                <legend>Consulta de Barbero (Ajax)</legend>
                ID Barbero:
                <h:inputText value="#{bankingBeanAjax.barberoId}"/><br/>
                Contraseña:
                <h:inputSecret value="#{bankingBeanAjax.password}"/><br/>
                <h:commandButton value="Ver Balance" 
                                 action="#{bankingBeanAjax.showBalance}">
                    <f:ajax execute="@form" render="ajaxMessage1"/>
                </h:commandButton>
                <br/>
                <h2><h:outputText value="#{bankingBeanAjax.message}" 
                                  id="ajaxMessage1"/></h2>
            </fieldset>
        </h:form>
    </h:body>
</html>
